<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Matrix | Obsidian Directorate</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --fsp-fire: #ff3300; --fsp-gold: #c5a059; --fsp-pitch: #0a0a0a; --fsp-green: #00ff66; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; color: #fff; font-family: 'Source Code Pro', monospace; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* HEADER AREA */
        header { 
            padding: 30px 50px; background: var(--fsp-pitch); border-bottom: 1px solid #111; 
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .sys-title { font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 8px; color: var(--fsp-fire); }
        .map-stats { font-size: 0.7rem; color: #444; letter-spacing: 2px; }
        .map-stats b { color: var(--fsp-gold); }

        /* MAP CONTAINER */
        .map-viewport { 
            flex: 1; position: relative; background: #050505; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        /* THE GRID OVERLAY */
        .map-grid {
            position: absolute; width: 200%; height: 200%;
            background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-200px);
            opacity: 0.3; z-index: 1;
        }

        /* DATA NODES */
        .node-point {
            position: absolute; width: 8px; height: 8px; 
            background: var(--fsp-green); border-radius: 50%;
            box-shadow: 0 0 15px var(--fsp-green); z-index: 5;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(2.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* DATA INFO PANEL */
        .intel-overlay {
            position: absolute; bottom: 40px; right: 40px; width: 300px;
            background: rgba(10,10,10,0.9); border: 1px solid #222; padding: 25px;
            z-index: 10; backdrop-filter: blur(10px);
        }
        .intel-header { font-family: 'Bebas Neue'; font-size: 1.2rem; color: var(--fsp-gold); margin-bottom: 15px; }
        .intel-line { font-size: 0.65rem; color: #666; margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 5px; }

        .btn-back {
            position: absolute; top: 120px; left: 50px;
            padding: 10px 25px; border: 1px solid #333; color: #fff;
            text-decoration: none; font-size: 0.7rem; z-index: 10; transition: 0.3s;
        }
        .btn-back:hover { border-color: var(--fsp-fire); background: var(--fsp-fire); }
    </style>
</head>
<body onload="seedNodes()">

    <header>
        <div class="sys-title">GLOBAL_MATRIX_FEED</div>
        <div class="map-stats">NODES_ONLINE: <b>302</b> // ACTIVE_SESSIONS: <b>84</b> // LATENCY: <b>14ms</b></div>
    </header>

    <div class="map-viewport">
        <div class="map-grid"></div>
        <a href="portal.html" class="btn-back">RETURN_TO_MATRIX</a>
        
        <div id="node-container"></div>

        <div class="intel-overlay">
            <div class="intel-header">LIVE_GEO_INTEL</div>
            <div id="intel-log">
                <div class="intel-line">SYST: Analyzing Node cluster...</div>
            </div>
        </div>
    </div>

    <script>
        function seedNodes() {
            const container = document.getElementById('node-container');
            const log = document.getElementById('intel-log');
            const cities = ["LONDON", "TOKYO", "BERLIN", "NYC", "LA", "PARIS", "DUBAI", "SEOUL"];

            // Place 40 random points to represent global clusters
            for (let i = 0; i < 40; i++) {
                const node = document.createElement('div');
                node.className = 'node-point';
                node.style.top = Math.random() * 80 + 10 + "%";
                node.style.left = Math.random() * 80 + 10 + "%";
                container.appendChild(node);
            }

            // Ticker for Geo Intel
            setInterval(() => {
                const city = cities[Math.floor(Math.random() * cities.length)];
                const id = 1000 + Math.floor(Math.random() * 9000);
                const div = document.createElement('div');
                div.className = 'intel-line';
                div.innerHTML = `[${city}] NODE_ID_${id} Status: <span style="color:var(--fsp-green)">UPLOAD_COMPLETE</span>`;
                log.prepend(div);
                if(log.children.length > 6) log.removeChild(log.lastChild);
            }, 3000);
        }
    </script>

</body>
</html>
