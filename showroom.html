<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom | Flammable Filth</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;900&family=Source+Code+Pro:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --fsp-fire: #ff3300; --fsp-gold: #c5a059; --fsp-pitch: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }

        /* THEATRE HEADER */
        .showroom-header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), #000), url('https://via.placeholder.com/1920x1080/0a0a0a/333333?text=CINEMATIC_MASTER_BG');
            background-size: cover;
            background-position: center;
            text-align: center;
            border-bottom: 1px solid #111;
        }

        .showroom-header h1 { font-family: 'Bebas Neue'; font-size: 8rem; letter-spacing: 25px; line-height: 0.9; margin-bottom: 20px; text-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .showroom-header p { font-family: 'Source Code Pro'; color: var(--fsp-fire); letter-spacing: 8px; font-size: 0.8rem; text-transform: uppercase; }

        /* FILTER BAR */
        .filter-nav {
            background: var(--fsp-pitch);
            padding: 20px 5%;
            display: flex;
            justify-content: center;
            gap: 40px;
            border-bottom: 1px solid #111;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .filter-link { font-family: 'Bebas Neue'; color: #444; text-decoration: none; letter-spacing: 3px; font-size: 1.1rem; transition: 0.3s; }
        .filter-link:hover, .filter-link.active { color: #fff; }

        /* THE GRID */
        .gallery-container { padding: 60px 5%; }
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 15px;
        }

        .asset-card {
            position: relative;
            aspect-ratio: 16/9;
            background: #080808;
            overflow: hidden;
            border: 1px solid #111;
            cursor: pointer;
        }
        .asset-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .asset-card:hover img { opacity: 1; transform: scale(1.05); }

        .asset-meta {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,1), transparent);
            transform: translateY(10px);
            opacity: 0;
            transition: 0.3s;
        }
        .asset-card:hover .asset-meta { transform: translateY(0); opacity: 1; }

        .meta-tag { font-family: 'Source Code Pro'; font-size: 0.6rem; color: var(--fsp-gold); letter-spacing: 2px; }
        .meta-title { font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 2px; margin-top: 5px; }

        .quality-badge {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.8); border: 1px solid var(--fsp-fire);
            color: var(--fsp-fire); padding: 5px 10px; font-size: 0.6rem; font-weight: 900;
        }

    </style>
</head>
<body>

    <header class="showroom-header">
        <p>A1_ELITE_PRODUCTION_HOUSE</p>
        <h1>FLAMMABLE<br>FILTH</h1>
        <div style="margin-top: 40px;">
            <a href="portal.html" style="color: #fff; text-decoration: none; font-family: 'Source Code Pro'; font-size: 0.7rem; border: 1px solid #333; padding: 15px 30px; letter-spacing: 3px;">RETURN_TO_DIRECTORATE</a>
        </div>
    </header>

    <nav class="filter-nav">
        <a href="#" class="filter-link active">ALL_ASSETS</a>
        <a href="#" class="filter-link">NEO_NOIR</a>
        <a href="#" class="filter-link">SILK_LIFESTYLE</a>
        <a href="#" class="filter-link">RAW_DIRECTORATE</a>
    </nav>

    <main class="gallery-container">
        <div class="asset-grid">
            <div class="asset-card">
                <div class="quality-badge">8K_UHD</div>
                <img src="https://via.placeholder.com/800x450/0f0f0f/444444?text=SOPHIA_EXECUTIVE_HEAT" alt="Production">
                <div class="asset-meta">
                    <span class="meta-tag">NODE_SOPHIA // SEASON_01</span>
                    <h3 class="meta-title">EXECUTIVE_HEAT_VOL_01</h3>
                </div>
            </div>

            <div class="asset-card">
                <div class="quality-badge">8K_UHD</div>
                <img src="https://via.placeholder.com/800x450/0f0f0f/444444?text=JORDAN_SILK_LIFESTYLE" alt="Production">
                <div class="asset-meta">
                    <span class="meta-tag">NODE_JORDAN // SEASON_01</span>
                    <h3 class="meta-title">SILK_LIFESTYLE_MORN</h3>
                </div>
            </div>

            <div class="asset-card" style="border-color: var(--fsp-gold);">
                <div class="quality-badge" style="border-color: var(--fsp-gold); color: var(--fsp-gold);">ELITE_SYNC</div>
                <img src="https://via.placeholder.com/800x450/0f0f0f/444444?text=ZARA_DIRECTORATE_RAW" alt="Production">
                <div class="asset-meta">
                    <span class="meta-tag">NODE_ZARA // ROYAL_STATUS</span>
                    <h3 class="meta-title">DIRECTORATE_RAW_FEATURE</h3>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
