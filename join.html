<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initialize Identity | FSP Talent Intake</title>
    <style>
        :root {
            --fsp-black: #050505;
            --fsp-pitch: #000000;
            --fsp-fire: #ff3300;
            --fsp-gold: #c5a059;
            --fsp-white: #ffffff;
            --fsp-grey: #121212;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--fsp-pitch);
            color: var(--fsp-white);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        /* COMMAND HEADER - 180px */
        header.fsp-nav-command {
            position: fixed; top: 0; left: 0; width: 100%; height: 180px; 
            background: rgba(0, 0, 0, 0.98); display: flex; align-items: center;
            justify-content: space-between; padding: 0 50px; border-bottom: 2px solid #1a1a1a;
            z-index: 10000; backdrop-filter: blur(30px);
        }

        .fsp-logo-main { height: 150px; width: auto; }

        /* MAIN LAYOUT */
        .join-container {
            margin-top: 180px; padding: 60px 5%;
            display: grid; grid-template-columns: 1fr 1.2fr; gap: 50px;
        }

        /* LEFT: THE LIVE PREVIEW CARD (THE "GLOW" ON THE PORTAL) */
        .preview-pane {
            position: sticky; top: 220px; height: fit-content;
            background: #080808; border: 1px solid #222; padding: 30px;
            text-align: center; box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        .id-card-preview {
            width: 100%; aspect-ratio: 3/4; background: #000;
            border: 1px solid var(--fsp-fire); margin-top: 20px;
            position: relative; overflow: hidden;
            box-shadow: 0 0 20px var(--fsp-glow);
        }

        #preview-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .preview-overlay {
            position: absolute; bottom: 0; width: 100%; padding: 20px;
            background: linear-gradient(transparent, #000); text-align: left;
        }

        /* RIGHT: THE SMART FORM */
        .form-box { background: #0a0a0a; padding: 50px; border: 1px solid #151515; }

        h2 { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; letter-spacing: 4px; color: var(--fsp-fire); margin-bottom: 20px; }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        input, select, textarea {
            width: 100%; background: #000; border: 1px solid #333; padding: 15px;
            color: white; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--fsp-fire); }

        /* ATTRIBUTES SELECTOR */
        .attribute-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 10px; }

        .upload-section { margin: 30px 0; border-top: 1px solid #222; padding-top: 20px; }

        .file-label {
            display: block; padding: 20px; border: 2px dashed #333; text-align: center;
            cursor: pointer; transition: 0.3s; color: #666; font-weight: 900;
        }

        .file-label:hover { border-color: var(--fsp-gold); color: white; }

        .initialize-btn {
            width: 100%; padding: 30px; background: var(--fsp-fire); border: none;
            color: white; font-weight: 900; font-size: 1.5rem; letter-spacing: 5px;
            cursor: pointer; margin-top: 30px; transition: 0.5s;
        }

        .initialize-btn:hover { background: var(--fsp-white); color: #000; box-shadow: 0 0 50px white; }

        @media (max-width: 1000px) { .join-container { grid-template-columns: 1fr; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="fsp-nav-command">
        <a href="index.html"><img src="VEXILLIALSDP_FSP.png" class="fsp-logo-main"></a>
        <div style="text-align: right; color: var(--fsp-gold); font-size: 0.7rem; font-weight: 900; letter-spacing: 2px;">
            INTAKE SYSTEM: ACTIVE<br>STATUS: ENCRYPTED
        </div>
    </header>

    <main class="join-container">
        
        <section class="preview-pane">
            <h3 style="letter-spacing: 3px; font-size: 0.8rem; color: #444;">PORTAL PREVIEW</h3>
            <div class="id-card-preview">
                <img id="preview-img" src="" alt="Awaiting Capture...">
                <div class="preview-overlay">
                    <span id="preview-name" style="font-weight: 900; font-size: 1.5rem; text-transform: uppercase;">STAGE NAME</span><br>
                    <span id="preview-status" style="color: var(--fsp-gold); font-size: 0.7rem; letter-spacing: 2px;">CERTIFIED ELITE</span>
                </div>
            </div>
            <p style="margin-top: 20px; color: #555; font-size: 0.7rem;">Every photo and video you upload is recorded to your Certified History.</p>
        </section>

        <section class="form-box">
            <form id="intakeForm">
                <h2>IDENTIFICATION</h2>
                <div class="input-row">
                    <input type="text" id="firstName" placeholder="LEGAL FIRST NAME" required>
                    <input type="text" id="lastName" placeholder="LEGAL LAST NAME" required>
                </div>
                <div class="input-row">
                    <input type="text" id="stageName" placeholder="DESIRED STAGE NAME" onkeyup="updatePreview()" required>
                    <input type="email" placeholder="SECURE EMAIL" required>
                </div>

                <h2>DIMENSIONS & ATTRIBUTES</h2>
                <div class="attribute-grid">
                    <select id="height"><option>HEIGHT</option><option>5'0-5'4</option><option>5'5-5'8</option><option>5'9+</option></select>
                    <select id="eyes"><option>EYE COLOR</option><option>BLUE</option><option>BROWN</option><option>GREEN</option><option>HAZEL</option></select>
                    <select id="hair"><option>HAIR</option><option>BLONDE</option><option>BRUNETTE</option><option>BLACK</option><option>RED</option></select>
                </div>
                <div class="input-row" style="margin-top:20px;">
                    <input type="text" placeholder="TOP DIMENSIONS (e.g. 34D)">
                    <input type="text" placeholder="WAIST/HIPS">
                </div>
                <textarea placeholder="TELL THE DIRECTORATE ABOUT YOUR BODY AND YOUR INTERESTS..." rows="4" style="margin-top:10px;"></textarea>

                <div class="upload-section">
                    <h2>THE EVIDENCE (MANDATORY)</h2>
                    <p style="font-size: 0.6rem; color: #ff3300; margin-bottom: 15px;">NO FILTERS. NO BLUR. FIVE ANGLES REQUIRED.</p>
                    <div class="attribute-grid">
                        <label class="file-label">FACE<input type="file" id="faceImg" accept="image/*" hidden onchange="showImg(this)"></label>
                        <label class="file-label">UPPER FR<input type="file" accept="image/*" hidden></label>
                        <label class="file-label">UPPER BK<input type="file" accept="image/*" hidden></label>
                        <label class="file-label">LOWER FR<input type="file" accept="image/*" hidden></label>
                        <label class="file-label">LOWER BK<input type="file" accept="image/*" hidden></label>
                        <label class="file-label" style="border-color:var(--fsp-fire); color:white;">VIDEO INTRO<input type="file" accept="video/*" hidden></label>
                    </div>
                </div>

                <button type="submit" class="initialize-btn">INITIALIZE STAR STATUS</button>
            </form>
        </section>
    </main>

    <script>
        // FUNCTION TO UPDATE THE PREVIEW NAME LIVE
        function updatePreview() {
            const name = document.getElementById('stageName').value;
            document.getElementById('preview-name').innerText = name || "STAGE NAME";
        }

        // FUNCTION TO SHOW THE IMAGE IN THE PREVIEW CARD IMMEDIATELY
        function showImg(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('preview-img');
                    img.src = e.target.result;
                    img.style.opacity = "1";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // FUNCTION TO HANDLE THE "INITIALIZE" BUTTON CLICK
        document.getElementById('intakeForm').onsubmit = function(e) {
            e.preventDefault();
            alert("SYSTEM ALERT: Your Identity is being Certified. Your profile is now being loaded into the Obsidian Portal.");
            window.location.href = "portal.html"; // Redirects to the portal
        };
    </script>

</body>
</html>
