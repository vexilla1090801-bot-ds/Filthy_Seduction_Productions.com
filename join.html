<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Intake | FSP Obsidian Directorate</title>
    <style>
        :root {
            --fsp-black: #050505; --fsp-pitch: #000; --fsp-fire: #ff3300; --fsp-gold: #c5a059; --fsp-white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--fsp-pitch); color: var(--fsp-white); font-family: 'Outfit', sans-serif; overflow-x: hidden; }

        /* COMMAND HEADER SYNC - 180px */
        header { height: 180px; display: flex; align-items: center; justify-content: space-between; padding: 0 50px; border-bottom: 2px solid #111; background: #000; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { height: 150px; }

        .dashboard-container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; padding: 220px 5% 50px; max-width: 1600px; margin: 0 auto; }

        /* THE OBSIDIAN MIRROR (PREVIEW PANE) */
        .mirror-pane { position: sticky; top: 220px; background: #080808; border: 1px solid #1a1a1a; padding: 20px; height: fit-content; text-align: center; }
        .mirror-display { 
            width: 100%; aspect-ratio: 3/4; background: #000; border: 1px solid #222; 
            display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; 
        }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        #preview-vid { width: 100%; height: 100%; display: none; }
        .mirror-tag { position: absolute; top: 15px; left: 15px; font-size: 0.6rem; color: var(--fsp-gold); letter-spacing: 3px; font-weight: 900; background: rgba(0,0,0,0.7); padding: 5px 10px; }
        .status-msg { margin-top: 20px; font-size: 0.7rem; color: #444; letter-spacing: 2px; text-transform: uppercase; }

        /* ASSET UPLOAD GRID */
        .form-content h2 { font-family: 'Bebas Neue'; font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 30px; border-left: 4px solid var(--fsp-fire); padding-left: 20px; }
        .upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 40px; }

        .upload-slot {
            height: 140px; background: #080808; border: 1px dashed #333; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s; position: relative;
        }
        .upload-slot:hover { border-color: var(--fsp-fire); background: #0d0d0d; }
        .upload-slot.verified { border: 1px solid var(--fsp-gold); background: rgba(197, 160, 89, 0.05); }

        .slot-label { font-size: 0.6rem; letter-spacing: 2px; color: #555; margin-top: 10px; font-weight: 900; }
        .upload-slot.verified .slot-label { color: var(--fsp-gold); }
        .check-icon { font-size: 1.5rem; color: var(--fsp-gold); display: none; }
        .upload-slot.verified .check-icon { display: block; }
        .upload-slot.verified .plus-icon { display: none; }
        
        /* VIDEO SLOT */
        .video-slot { grid-column: span 3; height: 100px; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .video-slot.verified { border: 1px solid var(--fsp-fire); }

        /* TOGGLES */
        .status-container { display: flex; gap: 20px; margin: 40px 0; }
        .toggle-btn { flex: 1; padding: 20px; background: #080808; border: 1px solid #222; color: #444; font-weight: 900; letter-spacing: 2px; cursor: pointer; text-align: center; font-size: 0.7rem; }
        .toggle-btn.active { border-color: var(--fsp-gold); color: #fff; background: #111; }

        .final-btn { width: 100%; padding: 30px; background: var(--fsp-fire); color: #fff; border: none; font-weight: 900; letter-spacing: 8px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        .final-btn:hover { background: #fff; color: #000; box-shadow: 0 0 40px rgba(255,255,255,0.2); }

        @media (max-width: 1000px) { .dashboard-container { grid-template-columns: 1fr; } .mirror-pane { position: static; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;700;900&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <a href="index.html"><img src="VEXILLIALSDP_FSP.png" class="logo"></a>
    <div style="text-align: right; border-right: 3px solid var(--fsp-fire); padding-right: 20px;">
        <span id="tier-display" style="color:var(--fsp-gold); font-weight:900; letter-spacing:3px;">INITIALIZING...</span>
    </div>
</header>

<main class="dashboard-container">
    <section class="mirror-pane">
        <div class="mirror-display">
            <div class="mirror-tag" id="mirror-label">SYSTEM STANDBY</div>
            <img id="preview-img">
            <video id="preview-vid" controls></video>
            <div id="null-text" style="color:#222; letter-spacing:10px; font-weight:900; font-size:0.8rem;">NO SIGNAL</div>
        </div>
        <div class="status-msg" id="status-msg">AWAITING ASSET UPLOAD</div>
    </section>

    <section class="form-content">
        <h2>01. IDENTITY ASSETS</h2>
        <div class="upload-grid">
            <label class="upload-slot" id="slot-face" onclick="showPreview('face')">
                <span class="plus-icon">+</span>
                <span class="check-icon">✓</span>
                <span class="slot-label">FACE</span>
                <input type="file" hidden accept="image/*" onchange="processFile(this, 'face')">
            </label>
            <label class="upload-slot" id="slot-front" onclick="showPreview('front')">
                <span class="plus-icon">+</span>
                <span class="check-icon">✓</span>
                <span class="slot-label">FRONT</span>
                <input type="file" hidden accept="image/*" onchange="processFile(this, 'front')">
            </label>
            <label class="upload-slot" id="slot-back" onclick="showPreview('back')">
                <span class="plus-icon">+</span>
                <span class="check-icon">✓</span>
                <span class="slot-label">BACK</span>
                <input type="file" hidden accept="image/*" onchange="processFile(this, 'back')">
            </label>
        </div>

        <h2>02. PRODUCTION VIDEO</h2>
        <div class="upload-grid">
            <label class="upload-slot video-slot" id="slot-video" onclick="showPreview('video')">
                <span class="plus-icon">+ UPLOAD 60-MINUTE SCRIPTED VIDEO</span>
                <span class="check-icon">✓ VIDEO VERIFIED - CLICK TO RE-WATCH</span>
                <input type="file" hidden accept="video/*" onchange="processFile(this, 'video')">
            </label>
        </div>

        <h2>03. CASTING PREFERENCE</h2>
        <p style="font-size:0.7rem; color:#555; margin-bottom:15px; letter-spacing:1px;">Toggle your visibility. Your profile and metadata stay permanent even if paused.</p>
        <div class="status-container">
            <div class="toggle-btn active" id="btn-active" onclick="setAvailability('active')">ACTIVE FOR JOBS</div>
            <div class="toggle-btn" id="btn-pause" onclick="setAvailability('pause')">PAUSE FOR BREAK</div>
        </div>

        <button class="final-btn" onclick="submitToLedger()">APPROVE & SYNC TO PORTAL</button>
    </section>
</main>

<script>
    // Memory Store for Previews
    const assetStore = { face: null, front: null, back: null, video: null };

    window.onload = function() {
        const tier = sessionStorage.getItem('selectedTier') || 'BASIC';
        document.getElementById('tier-display').innerText = tier.toUpperCase() + " INTAKE";
    };

    function processFile(input, type) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                assetStore[type] = e.target.result;
                document.getElementById('slot-' + type).classList.add('verified');
                showPreview(type); // Auto-show the mirror when uploaded
                document.getElementById('status-msg').innerText = "ASSET '" + type.toUpperCase() + "' SECURED";
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function showPreview(type) {
        const data = assetStore[type];
        const img = document.getElementById('preview-img');
        const vid = document.getElementById('preview-vid');
        const label = document.getElementById('mirror-label');
        const nullText = document.getElementById('null-text');

        if (!data) return; // Only preview if file exists

        nullText.style.display = "none";
        label.innerText = "PREVIEWING: " + type.toUpperCase();

        if (type === 'video') {
            img.style.display = "none";
            vid.style.display = "block";
            vid.src = data;
        } else {
            vid.style.display = "none";
            img.style.display = "block";
            img.src = data;
        }
    }

    function setAvailability(mode) {
        document.getElementById('btn-active').classList.remove('active');
        document.getElementById('btn-pause').classList.remove('active');
        document.getElementById('btn-' + mode).classList.add('active');
    }

    function submitToLedger() {
        if (!assetStore.face || !assetStore.video) {
            alert("ERROR: Face photo and Production Video are mandatory for synchronization.");
            return;
        }
        alert("METADATA SYNC COMPLETE. PROFILE IS NOW LIVE.");
        window.location.href = "portal.html";
    }
</script>

</body>
</html>
