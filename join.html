<div class="upload-grid">
    <label class="file-label">FACE<input type="file" id="fIn" accept="image/*" hidden onchange="loadPreview(this, 'FACE')"></label>
    <label class="file-label">UPPER FR<input type="file" accept="image/*" hidden onchange="loadPreview(this, 'UPPER FRONT')"></label>
    <label class="file-label">UPPER BK<input type="file" accept="image/*" hidden onchange="loadPreview(this, 'UPPER BACK')"></label>
    <label class="file-label">LOWER FR<input type="file" accept="image/*" hidden onchange="loadPreview(this, 'LOWER FRONT')"></label>
    <label class="file-label">LOWER BK<input type="file" accept="image/*" hidden onchange="loadPreview(this, 'LOWER BACK')"></label>
    <label class="file-label" style="border-color:var(--fsp-fire); color:white;">VIDEO INTRO<input type="file" id="vIn" accept="video/*" hidden onchange="loadVideo(this)"></label>
</div>

<script>
    // FIX: Show whatever image was just clicked
    function loadPreview(input, label) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('preview-img');
                const ghost = document.getElementById('ghost-silhouette');
                img.src = e.target.result;
                img.style.display = "block";
                ghost.style.display = "none";
                document.getElementById('p-status').innerText = "VIEWING: " + label;
                
                // SAVE TO SESSION (To pass to portal.html)
                if(label === 'FACE') sessionStorage.setItem('userPhoto', e.target.result);
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function loadVideo(input) {
        if (input.files && input.files[0]) {
            document.getElementById('p-status').innerText = "VIDEO CAPTURED ✓";
            document.getElementById('p-status').style.color = "var(--fsp-gold)";
            sessionStorage.setItem('hasVideo', 'true');
        }
    }

    function syncName() {
        const val = document.getElementById('sName').value;
        document.getElementById('p-name').innerText = val || "STAGE NAME";
        sessionStorage.setItem('userName', val);
    }

    document.getElementById('intakeForm').onsubmit = function(e) {
        e.preventDefault();
        // Trigger the "Encryption" animation then redirect
        let bar = document.getElementById('p-bar');
        let fill = document.getElementById('progress-fill');
        bar.style.display = "block";
        let width = 0;
        let interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                window.location.href = "portal.html";
            } else { width++; fill.style.width = width + "%"; }
        }, 20);
    };
</script>
