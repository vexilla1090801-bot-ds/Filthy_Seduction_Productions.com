<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Obsidian Directorate</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --fsp-fire: #ff3300; --fsp-pitch: #030303; --fsp-border: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; color: #fff; font-family: 'Source Code Pro', monospace; 
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .auth-container { width: 400px; padding: 40px; background: var(--fsp-pitch); border: 1px solid var(--fsp-border); text-align: center; }
        .auth-logo { font-family: 'Bebas Neue'; font-size: 2.5rem; letter-spacing: 10px; margin-bottom: 30px; }

        /* SCANNING ANIMATION */
        .scanner-box { 
            width: 100%; height: 2px; background: var(--fsp-fire); 
            box-shadow: 0 0 15px var(--fsp-fire); margin: 20px 0;
            position: relative; animation: scan 2s infinite ease-in-out;
        }
        @keyframes scan { 
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(150px); opacity: 0; }
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 0.6rem; color: #444; letter-spacing: 2px; display: block; margin-bottom: 5px; }
        input { 
            width: 100%; background: #000; border: 1px solid #222; padding: 12px; 
            color: var(--fsp-fire); font-family: 'Source Code Pro'; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--fsp-fire); box-shadow: 0 0 10px rgba(255, 51, 0, 0.2); }

        .btn-auth { 
            width: 100%; padding: 15px; background: transparent; border: 1px solid var(--fsp-fire);
            color: #fff; font-family: 'Bebas Neue'; font-size: 1.2rem; letter-spacing: 5px;
            cursor: pointer; transition: 0.4s; margin-top: 10px;
        }
        .btn-auth:hover { background: var(--fsp-fire); box-shadow: 0 0 30px var(--fsp-fire); }

        #status-msg { font-size: 0.6rem; color: #333; margin-top: 20px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-logo">ACCESS_KEY</div>
    
    <div style="height: 150px; border: 1px solid #080808; margin-bottom: 30px; position: relative;">
        <div class="scanner-box"></div>
        <p style="font-size: 0.5rem; color: #222; position: absolute; bottom: 10px; width: 100%;">RETINAL_SCAN_PENDING</p>
    </div>

    <form onsubmit="verifyKey(event)">
        <div class="input-group">
            <label>IDENT_STRING</label>
            <input type="text" placeholder="NODE_NAME" id="ident" required>
        </div>
        <div class="input-group">
            <label>ENCRYPTION_PHRASE</label>
            <input type="password" placeholder="••••••••" id="pass" required>
        </div>
        <button type="submit" class="btn-auth">DECRYPT_ACCESS</button>
    </form>

    <div id="status-msg">SYSTEM_IDLE // WAITING_FOR_INPUT</div>
</div>

<script>
    function verifyKey(e) {
        e.preventDefault();
        const msg = document.getElementById('status-msg');
        msg.innerHTML = "<span style='color: #00ff66;'>VERIFYING_IDENTITY...</span>";
        
        // Webmaster Logic: Simple redirect for the demo
        setTimeout(() => {
            window.location.href = "portal.html";
        }, 1500);
    }
</script>

</body>
</html>
