<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Enrollment | FSP</title>
    <style>
        :root { --fsp-pitch: #000; --fsp-fire: #ff3300; --fsp-gold: #c5a059; --fsp-white: #fff; }
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; padding-top: 200px; }
        header { height: 180px; display: flex; align-items: center; padding: 0 50px; background: #000; position: fixed; width: 100%; top: 0; border-bottom: 2px solid #111; }
        .logo { height: 150px; }
        .container { max-width: 900px; margin: 0 auto; padding: 50px; background: #080808; border: 1px solid #1a1a1a; }
        h1 { font-family: 'Bebas Neue'; font-size: 3rem; color: var(--fsp-gold); letter-spacing: 5px; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.6rem; color: #555; letter-spacing: 2px; margin-bottom: 8px; font-weight: 900; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; outline: none; }
        input:focus { border-color: var(--fsp-fire); }
        .submit-btn { width: 100%; padding: 25px; background: var(--fsp-fire); color: #fff; border: none; font-weight: 900; letter-spacing: 5px; cursor: pointer; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>
    <header><img src="VEXILLIALSDP_FSP.png" class="logo"></header>
    <div class="container">
        <h1>BASIC ENROLLMENT</h1>
        <p style="color:#555; margin-bottom:40px; font-size:0.8rem; letter-spacing:1px;">FREE ACCESS // SECURE ENCRYPTED IDENTITY // NO IMAGES REQUIRED FOR INITIAL REGISTRATION</p>
        <form onsubmit="event.preventDefault(); window.location.href='join.html';">
            <div class="form-grid">
                <div class="input-group"><label>FIRST NAME</label><input type="text" required></div>
                <div class="input-group"><label>LAST NAME</label><input type="text" required></div>
            </div>
            <div class="input-group"><label>LEGAL ADDRESS (FOR VERIFICATION)</label><input type="text" required></div>
            <div class="input-group"><label>EMAIL ADDRESS</label><input type="email" required></div>
            <div class="form-grid">
                <div class="input-group"><label>GENDER</label><select><option>FEMALE</option><option>MALE</option><option>NON-BINARY</option></select></div>
                <div class="input-group"><label>AGE</label><input type="number" min="18" required></div>
            </div>
            <div class="input-group"><label>ADULT SCREEN NAME (OPTIONAL)</label><input type="text" placeholder="Desired Screen Name"></div>
            <div class="input-group"><label>INTERESTED CONTENT TYPES</label><textarea placeholder="e.g. Solo, Dialogue, Professional Modeling"></textarea></div>
            <button type="submit" class="submit-btn">AUTHORIZE BASIC MEMBERSHIP</button>
        </form>
    </div>
</body>
</html>
