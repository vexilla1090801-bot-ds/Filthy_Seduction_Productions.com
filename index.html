<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSP | Filthy Seduction Productions - The Obsidian Directorate</title>
    <style>
        :root {
            --fsp-black: #050505;
            --fsp-pitch: #000000;
            --fsp-fire: #ff3300;
            --fsp-gold: #c5a059;
            --fsp-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--fsp-black);
            color: var(--fsp-white);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* MASTER COMMAND HEADER - 180px SYNC */
        header.fsp-nav-command {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 180px; 
            background: rgba(0, 0, 0, 0.98);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            border-bottom: 2px solid #1a1a1a;
            z-index: 10000;
            backdrop-filter: blur(30px);
        }

        .logo-box { height: 100%; display: flex; align-items: center; }

        .fsp-logo-main {
            height: 150px; /* Big Dog Size */
            width: auto;
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .fsp-logo-main:hover {
            filter: drop-shadow(0 0 30px var(--fsp-fire));
            transform: scale(1.03);
        }

        /* NAV ACTIONS */
        .nav-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .status-light {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--fsp-fire);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--fsp-fire);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--fsp-fire);
            animation: blink 1.5s infinite;
        }

        .portal-btn {
            color: var(--fsp-white);
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--fsp-fire);
            padding-bottom: 4px;
            transition: 0.3s;
        }

        .portal-btn:hover { color: var(--fsp-gold); border-color: var(--fsp-gold); }

        /* THE MAIN CANVAS - RECALIBRATED */
        .main-canvas {
            margin-top: 180px; /* Perfect Header Offset */
            height: calc(100vh - 180px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            padding: 40px;
        }

        .bebas {
            font-family: 'Bebas Neue', cursive;
            font-size: clamp(3.5rem, 12vw, 8rem);
            letter-spacing: 15px;
            line-height: 0.85;
            margin-bottom: 30px;
        }

        .fire-text { color: var(--fsp-fire); text-shadow: 0 0 50px var(--fsp-fire); }

        .cta-box { margin-top: 50px; }

        .big-dog-btn {
            padding: 25px 80px;
            background: var(--fsp-fire);
            color: white;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 1.3rem;
            transition: 0.5s;
            display: inline-block;
        }

        .big-dog-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 60px white;
            transform: translateY(-10px);
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* MOBILE FIX */
        @media (max-width: 1024px) {
            header.fsp-nav-command { height: 140px; padding: 0 20px; }
            .fsp-logo-main { height: 110px; }
            .main-canvas { margin-top: 140px; height: calc(100vh - 140px); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="fsp-nav-command">
        <div class="logo-box">
            <img src="VEXILLIALSDP_FSP.png" alt="FSP Master Logo" class="fsp-logo-main">
        </div>
        
        <div class="nav-actions">
            <div class="status-light">
                <div class="pulse"></div>
                SYSTEM ONLINE
            </div>
            <a href="portal.html" class="portal-btn">VIEW PORTAL</a>
        </div>
    </header>

    <main class="main-canvas">
        <h1 class="bebas">OBSIDIAN <span class="fire-text">LEDGER</span></h1>
        <p style="text-transform: uppercase; color: #555; letter-spacing: 5px; font-weight: 700; font-size: 1rem;">
            Certified History. $100/hr Baseline. Elite Only.
        </p>
        
        <div class="cta-box">
            <a href="join.html" class="big-dog-btn">INITIALIZE STATUS</a>
        </div>
    </main>

    <footer style="padding: 40px; background: #000; text-align: center; font-size: 0.7rem; color: #222; letter-spacing: 5px; border-top: 1px solid #0a0a0a;">
        FILTHY SEDUCTION PRODUCTIONS &copy; 2026 | BUILT FOR THE BIG DOGS
    </footer>

</body>
</html>
