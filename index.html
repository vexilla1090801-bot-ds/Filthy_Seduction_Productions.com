<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FSP | The Obsidian Directorate</title>
    <style>
        :root { --fsp-pitch: #000; --fsp-fire: #ff3300; --fsp-gold: #c5a059; --fsp-white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--fsp-pitch); color: var(--fsp-white); font-family: 'Outfit', sans-serif; }
        header { height: 180px; display: flex; align-items: center; justify-content: space-between; padding: 0 50px; border-bottom: 2px solid #111; background: #000; position: fixed; width: 100%; top: 0; z-index: 10000; }
        .logo { height: 150px; }
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-top: 180px; text-align: center; }
        .hero h1 { font-family: 'Bebas Neue'; font-size: 6rem; letter-spacing: 15px; }
        .tier-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 0 5% 100px; }
        .tier-card { background: #080808; border: 1px solid #1a1a1a; padding: 40px 30px; text-align: center; transition: 0.4s; }
        .tier-card:hover { border-color: var(--fsp-fire); transform: translateY(-10px); }
        .price { font-size: 3rem; font-weight: 900; margin: 20px 0; }
        .btn-select { display: block; width: 100%; padding: 20px; background: #111; color: #fff; text-decoration: none; font-weight: 900; letter-spacing: 3px; font-size: 0.75rem; text-transform: uppercase; }
        .tier-card:hover .btn-select { background: var(--fsp-fire); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="VEXILLIALSDP_FSP.png" class="logo">
        <span style="color:var(--fsp-fire); font-weight:900; letter-spacing:3px;">DIRECTORATE INDEX</span>
    </header>
    <div class="hero"><h1>OBSIDIAN</h1><p style="letter-spacing:10px; color:#444;">SELECT COMMITMENT LEVEL</p></div>
    <div class="tier-grid">
        <div class="tier-card"><h3>BASIC</h3><div class="price">FREE</div><a href="briefing-basic.html" class="btn-select">ENROLL FREE</a></div>
        <div class="tier-card"><h3>PRO</h3><div class="price">$29</div><a href="briefing-pro.html" class="btn-select">SELECT PRO</a></div>
        <div class="tier-card"><h3>ELITE</h3><div class="price">$99</div><a href="briefing-elite.html" class="btn-select">SELECT ELITE</a></div>
        <div class="tier-card"><h3>ICON</h3><div class="price">$249</div><a href="briefing-icon.html" class="btn-select">SELECT ICON</a></div>
    </div>
</body>
</html>
