<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSP | Filthy Seduction Productions - The Obsidian Directorate</title>
    <style>
        :root {
            --fsp-black: #050505;
            --fsp-pitch: #000000;
            --fsp-fire: #ff3300;
            --fsp-gold: #c5a059;
            --fsp-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--fsp-black);
            color: var(--fsp-white);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* UPGRADED HEADER: FULL ENCASEMENT */
        header.fsp-nav-command {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            /* Header is now 20px taller than the logo for a perfect vertical frame */
            height: 180px; 
            background: rgba(0, 0, 0, 0.98);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            border-bottom: 2px solid #1a1a1a;
            z-index: 10000;
            backdrop-filter: blur(30px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* CENTERED MASTER LOGO */
        .logo-box {
            height: 100%;
            display: flex;
            align-items: center; /* Vertical Center */
            justify-content: flex-start;
        }

        .fsp-logo-main {
            height: 150px; /* The massive Big Dog size */
            width: auto;
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.05));
        }

        .fsp-logo-main:hover {
            filter: drop-shadow(0 0 30px var(--fsp-fire));
            transform: scale(1.03);
        }

        /* NAV STATUS AREA */
        .nav-status-area {
            display: flex;
            flex-direction: column; /* Stacked for a professional dashboard look */
            align-items: flex-end;
            gap: 10px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #111;
            padding: 10px 20px;
            border: 1px solid #222;
            border-radius: 4px;
        }

        .pulse-light {
            width: 10px;
            height: 10px;
            background: var(--fsp-fire);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--fsp-fire);
            animation: pulse-glow 1.5s infinite;
        }

        .portal-link {
            color: var(--fsp-white);
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 3px;
            font-size: 0.9rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .portal-link:hover {
            color: var(--fsp-fire);
            text-shadow: 0 0 15px var(--fsp-fire);
        }

        /* THE OBSIDIAN CANVAS (AI LUST) */
        .main-canvas {
            margin-top: 180px; /* Perfectly matches the new header height */
            height: calc(100vh - 180px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #0f0f0f 0%, #000 100%);
            padding: 40px;
        }

        .bebas {
            font-family: 'Bebas Neue', cursive;
            font-size: clamp(3.5rem, 12vw, 8rem);
            letter-spacing: 15px;
            line-height: 0.8;
            margin-bottom: 25px;
        }

        .fire-glow {
            color: var(--fsp-fire);
            text-shadow: 0 0 40px var(--fsp-fire);
        }

        .cta-btn {
            margin-top: 40px;
            padding: 25px 70px;
            background: var(--fsp-fire);
            color: white;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.2rem;
            transition: 0.5s;
            border: 2px solid transparent;
        }

        .cta-btn:hover {
            background: transparent;
            border: 2px solid var(--fsp-fire);
            box-shadow: 0 0 50px var(--fsp-fire);
            transform: translateY(-10px);
        }

        @keyframes pulse-glow {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            header.fsp-nav-command { height: 130px; padding: 0 20px; }
            .fsp-logo-main { height: 100px; }
            .main-canvas { margin-top: 130px; height: calc(100vh - 130px); }
            .bebas { font-size: 3.5rem; letter-spacing: 5px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="fsp-nav-command">
        <div class="logo-box">
            <img src="VEXILLIALSDP_FSP.png" alt="FSP Master Logo" class="fsp-logo-main">
        </div>
        
        <div class="nav-status-area">
            <div class="status-badge">
                <span class="pulse-light"></span>
                <span style="font-size: 0.7rem; font-weight: 900; letter-spacing: 2px;">DIRECTORATE ONLINE</span>
            </div>
            <a href="portal.html" class="portal-link">OPEN PORTAL</a>
        </div>
    </header>

    <main class="main-canvas">
        <h1 class="bebas">OBSIDIAN <span class="fire-glow">LEDGER</span></h1>
        <p style="text-transform: uppercase; color: #444; letter-spacing: 4px; font-weight: 700; font-size: 1rem;">
            Certified Adult Identity. $100/hr Production Rate. Permanent History.
        </p>
        <a href="join.html" class="cta-btn">INITIALIZE STATUS</a>
    </main>

    <footer style="text-align: center; padding: 40px; background: #000; font-size: 0.7rem; color: #222; letter-spacing: 5px; border-top: 1px solid #0a0a0a;">
        FILTHY SEDUCTION PRODUCTIONS &copy; 2026 | BUILT FOR THE BIG DOGS
    </footer>

</body>
</html>
