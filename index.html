<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSP | The Obsidian Directorate Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --fsp-pitch: #000000; --fsp-card: #080808; --fsp-fire: #ff3300; 
            --fsp-gold: #c5a059; --fsp-white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--fsp-pitch); color: var(--fsp-white); font-family: 'Outfit', sans-serif; padding-top: 180px; }

        header { 
            height: 180px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 60px; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px); 
            position: fixed; width: 100%; top: 0; z-index: 10000; border-bottom: 1px solid #111; 
        }
        .logo { height: 150px; transition: 0.6s; }
        .logo:hover { filter: drop-shadow(0 0 25px var(--fsp-fire)); }
        
        .main-nav { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; }
        .main-nav a { color: #666; text-decoration: none; font-weight: 900; font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; }
        .main-nav a.active { color: var(--fsp-fire); border-bottom: 2px solid var(--fsp-fire); }

        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-family: 'Bebas Neue'; font-size: 8rem; letter-spacing: 20px; }

        .ticker { background: #050505; padding: 40px; display: flex; justify-content: center; gap: 60px; border-y: 1px solid #111; }
        .stat p { font-family: 'Bebas Neue'; font-size: 2rem; color: var(--fsp-gold); }

        footer { padding: 60px 10%; background: #000; border-top: 1px solid #111; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 40px; }
        .legal { font-size: 0.6rem; color: #333; line-height: 1.8; }
        .f-nav { display: flex; flex-direction: column; gap: 10px; }
        .f-nav a { color: #444; text-decoration: none; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header>
        <a href="index.html"><img src="VEXILLIALSDP_FSP.png" class="logo" alt="FSP"></a>
        <nav class="main-nav">
            <a href="index.html" class="active">COMMAND</a>
            <a href="portal.html">PORTAL</a>
            <a href="registry.html">REGISTRY</a>
            <a href="briefing-pro.html">BRIEFING</a>
        </nav>
    </header>

    <main class="hero">
        <h1>OBSIDIAN</h1>
        <p style="color:var(--fsp-gold); letter-spacing:10px;">DIRECTORATE COMMAND</p>
    </main>

    <section class="ticker">
        <div class="stat"><h4>PRO RATE</h4><p>$100/HR</p></div>
        <div class="stat"><h4>ICON RATE</h4><p>$250/HR</p></div>
    </section>

    <footer>
        <img src="VEXILLIALSDP_FSP.png" style="height:60px; opacity:0.3;">
        <div class="legal">18 U.S.C. § 2257 COMPLIANCE: ALL MODELS 18+. RECORDS MAINTAINED BY FSP.</div>
        <div class="f-nav">
            <a href="about.html">ABOUT</a>
            <a href="terms.html">TERMS</a>
            <a href="support.html">SUPPORT</a>
        </div>
    </footer>

</body>
</html>
