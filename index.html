<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>FSP | The Obsidian Directorate Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;700;900&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --fsp-pitch: #000000; --fsp-card: #080808; --fsp-fire: #ff3300; 
            --fsp-gold: #c5a059; --fsp-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--fsp-pitch); color: var(--fsp-white); font-family: 'Outfit', sans-serif; overflow-x: hidden; }

        /* FIXED MASTER HEADER */
        header { 
            height: 180px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 60px; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px); 
            position: fixed; width: 100%; top: 0; z-index: 10000; border-bottom: 1px solid #111; 
        }
        
        .logo-link { display: flex; align-items: center; text-decoration: none; }
        .logo { height: 150px; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .logo:hover { filter: drop-shadow(0 0 25px var(--fsp-fire)); transform: scale(1.02); }

        /* PRIMARY NAVIGATION (Core Pages Only) */
        .main-nav { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; }
        .main-nav a { 
            color: #666; text-decoration: none; font-weight: 900; font-size: 0.75rem; 
            letter-spacing: 4px; text-transform: uppercase; transition: 0.3s; padding-bottom: 5px;
            border-bottom: 2px solid transparent;
        }
        .main-nav a:hover, .main-nav a.active { color: var(--fsp-fire); border-bottom: 2px solid var(--fsp-fire); }

        .system-status { display: flex; align-items: center; gap: 12px; border-right: 3px solid var(--fsp-fire); padding-right: 20px; }
        .pulse { width: 10px; height: 10px; background: var(--fsp-fire); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* ADVANCED HERO SECTION */
        .hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; padding-top: 180px;
            background: radial-gradient(circle at center, #151515 0%, #000 100%);
        }
        .hero h1 { font-family: 'Bebas Neue'; font-size: clamp(4rem, 12vw, 9rem); letter-spacing: 25px; line-height: 0.85; margin-bottom: 20px; }
        .hero .terminal-text { font-family: 'Source Code Pro'; color: var(--fsp-gold); font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }

        /* REVENUE TICKER */
        .ticker { background: #050505; border-top: 1px solid #111; border-bottom: 1px solid #111; padding: 60px 0; display: flex; justify-content: center; gap: 80px; }
        .stat { text-align: center; }
        .stat h4 { font-size: 0.6rem; color: #444; letter-spacing: 4px; margin-bottom: 10px; text-transform: uppercase; }
        .stat p { font-size: 2.5rem; font-weight: 900; color: var(--fsp-gold); font-family: 'Bebas Neue'; }

        /* TIER CARDS */
        .tier-section { padding: 120px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--fsp-card); border: 1px solid #1a1a1a; padding: 60px 35px; text-align: center; transition: 0.5s; position: relative; }
        .card:hover { border-color: var(--fsp-white); transform: translateY(-10px); }
        .card.hot { border-top: 4px solid var(--fsp-fire); }
        .card.top { border-top: 4px solid var(--fsp-gold); }
        .price { font-size: 3.5rem; font-weight: 900; margin: 20px 0; }
        .commitment { font-size: 0.6rem; color: var(--fsp-fire); letter-spacing: 3px; font-weight: 900; margin-bottom: 30px; display: block; }
        .btn { display: block; width: 100%; padding: 20px; background: #111; color: #fff; text-decoration: none; font-weight: 900; letter-spacing: 5px; font-size: 0.7rem; border: 1px solid #222; transition: 0.3s; }
        .card:hover .btn { background: var(--fsp-white); color: #000; }
