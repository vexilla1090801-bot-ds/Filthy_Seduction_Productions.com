<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSP | The Obsidian Directorate</title>
    <style>
        :root { --fsp-black: #050505; --fsp-pitch: #000; --fsp-fire: #ff3300; --fsp-gold: #c5a059; --fsp-white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--fsp-pitch); color: var(--fsp-white); font-family: 'Outfit', sans-serif; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 180px; background: rgba(0,0,0,0.98); display: flex; align-items: center; justify-content: space-between; padding: 0 50px; border-bottom: 2px solid #1a1a1a; z-index: 10000; }
        .logo { height: 150px; }
        .hero { margin-top: 180px; padding: 100px 5%; text-align: center; background: radial-gradient(circle, #111 0%, #000 100%); }
        .bebas { font-family: 'Bebas Neue', cursive; font-size: clamp(3rem, 10vw, 7rem); letter-spacing: 12px; }
        .tier-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 50px 8%; }
        .tier-card { background: #080808; border: 1px solid #1a1a1a; padding: 40px; text-align: center; transition: 0.4s; }
        .tier-card:hover { border-color: var(--fsp-fire); transform: translateY(-10px); }
        .price { font-size: 2.5rem; font-weight: 900; margin: 20px 0; }
        .btn-tier { display: block; width: 100%; padding: 15px; background: #111; color: #fff; text-decoration: none; font-weight: 900; letter-spacing: 3px; font-size: 0.7rem; }
        .tier-card:hover .btn-tier { background: var(--fsp-fire); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="index.html"><img src="VEXILLIALSDP_FSP.png" class="logo"></a>
        <span style="color:var(--fsp-fire); font-weight:900; letter-spacing:3px;">DIRECTORATE</span>
    </header>
    <main class="hero">
        <h1 class="bebas">OBSIDIAN <span style="color:var(--fsp-gold)">LEDGER</span></h1>
        <p style="letter-spacing:5px; color:#555; margin-top:20px;">CERTIFIED PRODUCTION // $100+ HOURLY</p>
    </main>
    <section class="tier-grid">
        <div class="tier-card"><h3>BASIC</h3><div class="price">FREE</div><a href="join.html" class="btn-tier">START FREE</a></div>
        <div class="tier-card"><h3>PRO</h3><div class="price">$29<span>/MO</span></div><a href="briefing.tier=pro.html" class="btn-tier">SELECT PRO</a></div>
        <div class="tier-card"><h3>ELITE</h3><div class="price">$99<span>/MO</span></div><a href="briefing.tier=elite.html" class="btn-tier">SELECT ELITE</a></div>
        <div class="tier-card"><h3>ICON</h3><div class="price">$249<span>/MO</span></div><a href="briefing.tier=icon.html" class="btn-tier">SELECT ICON</a></div>
    </section>
</body>
</html>
