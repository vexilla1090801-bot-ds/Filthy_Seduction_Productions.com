<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Intake | FSP</title>
    <style>
        :root {
            --fsp-black: #050505; --fsp-fire: #ff3300; --fsp-gold: #c5a059; --fsp-white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; }

        /* HEADER 180px SYNC */
        header { height: 180px; display: flex; align-items: center; justify-content: space-between; padding: 0 50px; border-bottom: 2px solid #111; }
        .logo { height: 150px; }

        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; padding: 50px; margin-top: 20px; }

        /* THE OBSIDIAN MIRROR (PREVIEW PANE) */
        .mirror-container { position: sticky; top: 50px; background: #080808; border: 1px solid #222; padding: 20px; text-align: center; }
        .mirror-display { width: 100%; aspect-ratio: 3/4; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border: 1px solid #111; }
        #main-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        #video-preview { width: 100%; height: 100%; display: none; }
        .mirror-label { position: absolute; top: 10px; left: 10px; font-size: 0.6rem; color: var(--fsp-fire); letter-spacing: 2px; }

        /* FORM & BUTTONS */
        .form-area { background: #0a0a0a; padding: 40px; }
        .upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        
        /* THE DYNAMIC BUTTON */
        .upload-slot {
            height: 120px; background: #000; border: 1px dashed #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .upload-slot:hover { border-color: var(--fsp-fire); }
        .upload-slot.verified { border: 1px solid var(--fsp-gold); background: rgba(197, 160, 89, 0.05); }
        .upload-slot span { font-size: 0.6rem; letter-spacing: 1px; color: #444; margin-top: 5px; }
        .upload-slot.verified span { color: var(--fsp-gold); }
        
        .check-mark { display: none; color: var(--fsp-gold); font-size: 1.2rem; }
        .upload-slot.verified .check-mark { display: block; }
        .upload-slot.verified .plus-icon { display: none; }

        .btn-action { width: 100%; padding: 25px; background: var(--fsp-fire); border: none; color: #fff; font-weight: 900; letter-spacing: 5px; cursor: pointer; margin-top: 20px; }
        .btn-action:hover { background: #fff; color: #000; }

        /* STATUS CONTROLS */
        .profile-status { display: flex; gap: 20px; margin-top: 20px; }
        .status-toggle { flex: 1; padding: 15px; background: #111; border: 1px solid #222; color: #555; font-size: 0.7rem; text-align: center; cursor: pointer; }
        .status-toggle.active { border-color: var(--fsp-gold); color: white; }
    </style>
</head>
<body>

<header>
    <img src="VEXILLIALSDP_FSP.png" class="logo">
    <div style="text-align: right;">
        <span style="color:var(--fsp-fire); font-size: 0.8rem; letter-spacing: 3px; font-weight: 900;">DASHBOARD INITIALIZATION</span>
    </div>
</header>

<div class="dashboard">
    <div class="mirror-container">
        <div class="mirror-display" id="mirror">
            <div class="mirror-label" id="mirror-tag">AWAITING INPUT...</div>
            <img id="main-preview">
            <video id="video-preview" controls></video>
            <div id="placeholder-text" style="color:#222; font-size:0.7rem; letter-spacing:5px;">OFFLINE</div>
        </div>
        <p style="margin-top:20px; font-size:0.6rem; color:#444; line-height:1.5;">CLICK ANY VERIFIED SLOT TO PREVIEW OR REPLACE CONTENT.</p>
    </div>

    <div class="form-area">
        <h2 style="font-family:'Bebas Neue'; letter-spacing:5px; margin-bottom:20px;">01. ASSET MANAGEMENT</h2>
        
        <div class="upload-grid">
            <label class="upload-slot" id="slot-face" onclick="viewContent('face')">
                <div class="plus-icon">+</div>
                <div class="check-mark">✓</div>
                <span>FACE</span>
                <input type="file" hidden onchange="handleFile(this, 'face')">
            </label>
            <label class="upload-slot" id="slot-front" onclick="viewContent('front')">
                <div class="plus-icon">+</div>
                <div class="check-mark">✓</div>
                <span>FRONT</span>
                <input type="file" hidden onchange="handleFile(this, 'front')">
            </label>
            <label class="upload-slot" id="slot-back" onclick="viewContent('back')">
                <div class="plus-icon">+</div>
                <div class="check-mark">✓</div>
                <span>BACK</span>
                <input type="file" hidden onchange="handleFile(this, 'back')">
            </label>
        </div>

        <h2 style="font-family:'Bebas Neue'; letter-spacing:5px; margin-bottom:20px;">02. VIDEO REQUIREMENT (60 MIN)</h2>
        <label class="upload-slot" id="slot-video" style="width:100%; height:80px;" onclick="viewContent('video')">
            <div class="plus-icon">+ UPLOAD PRODUCTION VIDEO</div>
            <div class="check-mark">✓ VIDEO LOADED - CLICK TO PLAY</div>
            <input type="file" accept="video/*" hidden onchange="handleFile(this, 'video')">
        </label>

        <h2 style="font-family:'Bebas Neue'; letter-spacing:5px; margin-top:40px; margin-bottom:20px;">03. CASTING STATUS</h2>
        <p style="font-size:0.7rem; color:#666; margin-bottom:10px;">Inform directors of your availability. Your profile stays live regardless.</p>
        <div class="profile-status">
            <div class="status-toggle active" id="stat-active" onclick="setStatus('active')">ACTIVE FOR JOBS</div>
            <div class="status-toggle" id="stat-pause" onclick="setStatus('pause')">PAUSE INTAKE</div>
        </div>

        <button class="btn-action" onclick="finalize()">INITIALIZE CERTIFICATION</button>
    </div>
</div>

<script>
    // Local Store for Previews
    const productionStore = { face: null, front: null, back: null, video: null };

    function handleFile(input, type) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                productionStore[type] = e.target.result;
                document.getElementById('slot-' + type).classList.add('verified');
                viewContent(type); // Instant Preview after upload
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function viewContent(type) {
        const data = productionStore[type];
        const img = document.getElementById('main-preview');
        const vid = document.getElementById('video-preview');
        const tag = document.getElementById('mirror-tag');
        const placeholder = document.getElementById('placeholder-text');

        if (!data) return;

        placeholder.style.display = "none";
        tag.innerText = "VERIFYING ASSET: " + type.toUpperCase();

        if (type === 'video') {
            img.style.display = "none";
            vid.style.display = "block";
            vid.src = data;
        } else {
            vid.style.display = "none";
            img.style.display = "block";
            img.src = data;
        }
    }

    function setStatus(mode) {
        document.getElementById('stat-active').classList.remove('active');
        document.getElementById('stat-pause').classList.remove('active');
        document.getElementById('stat-' + mode).classList.add('active');
    }

    function finalize() {
        if (!productionStore.face || !productionStore.video) {
            alert("MANDATORY ASSETS MISSING: Face photo and Production Video required.");
            return;
        }
        alert("IDENTITY ENCRYPTED. Redirecting to Portal...");
        window.location.href = "portal.html";
    }
</script>

</body>
</html>
