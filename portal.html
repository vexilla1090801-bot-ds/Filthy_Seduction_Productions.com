<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Obsidian Ledger | FSP Talent Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --fsp-pitch: #000; --fsp-fire: #ff3300; --fsp-gold: #c5a059; --fsp-white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--fsp-pitch); color: var(--fsp-white); font-family: 'Outfit', sans-serif; }

        /* UNIVERSAL CENTERED HEADER */
        header { 
            height: 180px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 60px; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px); 
            position: fixed; width: 100%; top: 0; z-index: 10000; border-bottom: 1px solid #111; 
        }
        .logo { height: 150px; }
        .main-nav { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; }
        .main-nav a { color: #555; text-decoration: none; font-weight: 900; font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; transition: 0.3s; }
        .main-nav a:hover { color: var(--fsp-fire); }

        .portal-main { max-width: 1400px; margin: 240px auto 100px; padding: 0 5%; }

        /* PROFILE CARD DISPLAY */
        #profile-hub { display: none; text-align: center; }
        .ledger-card { 
            background: #080808; border: 1px solid #1a1a1a; max-width: 500px; margin: 0 auto;
            padding: 50px; border-top: 5px solid var(--fsp-gold); position: relative;
            cursor: pointer; transition: 0.4s;
        }
        .ledger-card:hover { transform: scale(1.02); box-shadow: 0 0 40px rgba(197,160,89,0.1); }
        .profile-img-frame { width: 180px; height: 180px; border: 2px solid #222; margin: 0 auto 30px; overflow: hidden; background: #111; }
        .profile-img-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .name-tag { font-family: 'Bebas Neue'; font-size: 3rem; letter-spacing: 8px; color: #fff; margin-bottom: 5px; }
        .tier-tag { color: var(--fsp-gold); font-size: 0.7rem; font-weight: 900; letter-spacing: 5px; margin-bottom: 30px; display: block; }
        
        .stats-table { text-align: left; background: #000; padding: 20px; border: 1px solid #111; }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #0a0a0a; padding-bottom: 5px; }
        .stat-line span:first-child { font-size: 0.55rem; color: #444; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .stat-line span:last-child { font-size: 0.8rem; color: #999; font-weight: 700; }

        .btn-action { margin-top: 30px; width: 100%; padding: 20px; font-weight: 900; letter-spacing: 5px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; border: none; }
        .btn-edit { background: transparent; border: 1px solid #222; color: #444; }
        .btn-edit:hover { border-color: #fff; color: #fff; }
        .btn-order { background: var(--fsp-fire); color: #fff; margin-top: 15px; text-decoration: none; display: block; }

        /* INTAKE FORM */
        #intake-form { background: #080808; border: 1px solid #111; padding: 60px; max-width: 900px; margin: 0 auto; }
        h2 { font-family: 'Bebas Neue'; font-size: 3rem; letter-spacing: 8px; color: var(--fsp-gold); margin-bottom: 40px; }
        .field-group { margin-bottom: 25px; }
        label { display: block; font-size: 0.6rem; color: #444; font-weight: 900; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 18px; color: #fff; font-family: 'Outfit'; font-size: 0.95rem; }
        input:focus { border-color: var(--fsp-fire); outline: none; }

        .btn-init { width: 100%; padding: 30px; background: var(--fsp-fire); color: #fff; font-weight: 900; letter-spacing: 10px; border: none; cursor: pointer; margin-top: 30px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <a href="index.html"><img src="VEXILLIALSDP_FSP.png" class="logo" alt="FSP"></a>
    <nav class="main-nav">
        <a href="index.html">COMMAND</a>
        <a href="briefing-basic.html">ENROLL</a>
        <a href="briefing-pro.html">PRO</a>
        <a href="briefing-elite.html">ELITE</a>
        <a href="briefing-icon.html">ICON</a>
    </nav>
</header>

<main class="portal-main">

    <div id="profile-hub">
        <div class="ledger-card">
            <div class="profile-img-frame">
                <img id="view-img" src="" alt="FSP TALENT">
            </div>
            <div id="view-name" class="name-tag">---</div>
            <span id="view-tier" class="tier-tag">---</span>
            
            <div class="stats-table">
                <div class="stat-line"><span>Directorate ID</span> <span id="view-id">--</span></div>
                <div class="stat-line"><span>Industry SSN</span> <span id="view-ssn">--</span></div>
                <div class="stat-line"><span>Revenue Scale</span> <span id="view-rev">--</span></div>
                <div class="stat-line"><span>Node Status</span> <span style="color:var(--fsp-fire)">PENDING PAYMENT</span></div>
            </div>

            <button class="btn-action btn-edit" id="owner-edit" onclick="toggleEdit()">EDIT IDENTITY</button>
            <a href="order-complete.html" class="btn-action btn-order">FINALIZE & LOCK LEDGER</a>
        </div>
    </div>

    <div id="intake-form">
        <h2>LEDGER INITIALIZATION</h2>
        <form onsubmit="saveProfile(event)">
            <div class="field-group">
                <label>ADULT SCREEN NAME (PUBLIC ALIAS)</label>
                <input type="text" id="in-name" required placeholder="ENTER ALIAS">
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="field-group">
                    <label>IDENTIFIED GENDER</label>
                    <select id="in-gender" required>
                        <option value="FEMALE">FEMALE</option>
                        <option value="MALE">MALE</option>
                        <option value="NON-BI">NON-BINARY</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>PRIMARY HEADSHOT</label>
                    <input type="file" id="in-file" accept="image/*" onchange="previewImage(event)">
                </div>
            </div>

            <div class="field-group">
                <label>CORE INTERESTS & PERFORMANCE BOUNDARIES</label>
                <textarea rows="4" id="in-bio" placeholder="LIST PRODUCTION CAPABILITIES..."></textarea>
            </div>

            <button type="submit" class="btn-init">INITIALIZE IDENTITY NODE</button>
        </form>
    </div>

</main>

<script>
    let profileImage = "";

    function previewImage(e) {
        const reader = new FileReader();
        reader.onload = () => { profileImage = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    }

    function saveProfile(e) {
        e.preventDefault();
        
        const tier = (sessionStorage.getItem('selectedTier') || 'BASIC').toUpperCase();
        const profileData = {
            name: document.getElementById('in-name').value,
            gender: document.getElementById('in-gender').value,
            tier: tier,
            id: `${tier}-${Math.floor(1000 + Math.random() * 9000)}-2026`,
            ssn: `${Math.floor(100 + Math.random() * 900)}-FS-${Math.floor(1000 + Math.random() * 9000)}`,
            image: profileImage || "default.png"
        };

        localStorage.setItem('fsp_active_profile', JSON.stringify(profileData));
        localStorage.setItem('is_owner', 'true');
        loadHub();
    }

    function loadHub() {
        const data = JSON.parse(localStorage.getItem('fsp_active_profile'));
        if(!data) return;

        document.getElementById('view-name').innerText = data.name;
        document.getElementById('view-tier').innerText = data.tier + " AUTHORIZED";
        document.getElementById('view-id').innerText = data.id;
        document.getElementById('view-ssn').innerText = data.ssn;
        document.getElementById('view-img').src = data.image;
        
        // Rev Map
        const revMap = { 'BASIC': '$0/HR', 'PRO': '$100/HR', 'ELITE': '$150/HR', 'ICON': '$250/HR' };
        document.getElementById('view-rev').innerText = revMap[data.tier] || '$0/HR';

        document.getElementById('intake-form').style.display = 'none';
        document.getElementById('profile-hub').style.display = 'block';
    }

    function toggleEdit() {
        document.getElementById('intake-form').style.display = 'block';
        document.getElementById('profile-hub').style.display = 'none';
    }

    // Auto-Run on Load
    window.onload = loadHub;
</script>

</body>
</html>
