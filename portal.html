<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal | FSP Obsidian Directorate</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;700;900&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --fsp-fire: #ff3300; --fsp-gold: #c5a059; --fsp-pitch: #0a0a0a; --fsp-green: #00ff66; --fsp-border: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; display: grid; grid-template-columns: 280px 1fr 320px; height: 100vh; overflow: hidden; }

        /* SIDEBARS */
        .sidebar { background: var(--fsp-pitch); border-right: 1px solid var(--fsp-border); padding: 40px 25px; display: flex; flex-direction: column; }
        .sidebar-right { border-left: 1px solid var(--fsp-border); border-right: none; }
        .nav-brand { font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 5px; color: var(--fsp-fire); margin-bottom: 50px; text-decoration: none; }
        .nav-link { display: block; color: #444; text-decoration: none; font-family: 'Bebas Neue'; font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 15px; transition: 0.3s; }
        .nav-link.active { color: var(--fsp-gold); }

        /* MAIN CONTENT */
        .main-portal { overflow-y: auto; padding: 40px; background: radial-gradient(circle at top right, #0d0d0d, #000); }
        .portal-header { margin-bottom: 40px; border-bottom: 1px solid var(--fsp-border); padding-bottom: 20px; }
        h2 { font-family: 'Bebas Neue'; font-size: 3.5rem; letter-spacing: 12px; }

        /* THE GRID */
        .node-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

        /* ENHANCED NODE CARD */
        .node-card {
            background: #050505; border: 1px solid var(--fsp-border);
            position: relative; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
        }
        .node-card:hover { border-color: var(--fsp-gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        /* IMAGE FALLBACK BOX */
        .node-image-container {
            width: 100%; height: 320px; background: #080808;
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .node-image-container img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) contrast(1.1); transition: 0.8s;
        }
        .node-card:hover img { filter: grayscale(0%) contrast(1); transform: scale(1.05); }

        /* CARD OVERLAY */
        .node-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,1) 30%, transparent);
        }
        .node-name { font-family: 'Bebas Neue'; font-size: 1.8rem; letter-spacing: 2px; }
        .node-status { font-family: 'Source Code Pro'; font-size: 0.6rem; color: var(--fsp-green); letter-spacing: 1px; }

        /* DATA LOG */
        .log-entry { font-family: 'Source Code Pro'; font-size: 0.65rem; color: #444; margin-bottom: 12px; border-left: 1px solid var(--fsp-fire); padding-left: 10px; }
    </style>
</head>
<body onload="bootPortal()">

    <nav class="sidebar">
        <a href="index.html" class="nav-brand">FSP_OS</a>
        <a href="portal.html" class="nav-link active">SURROGATE_MATRIX</a>
        <a href="ledger.html" class="nav-link">TALENT_LEDGER</a>
        <a href="production-briefs.html" class="nav-link">MISSIONS_DISPATCH</a>
        <a href="revenue-ledger.html" class="nav-link">ROYALTY_VAULT</a>
    </nav>

    <main class="main-portal">
        <header class="portal-header">
            <h2>MATRIX_CONTROL</h2>
            <p style="font-family: 'Source Code Pro'; font-size: 0.65rem; color: var(--fsp-gold); letter-spacing: 4px;">SYSTEM_STATUS: 300_NODES_ACTIVE</p>
        </header>

        <div class="node-grid" id="matrix-inject">
            </div>
    </main>

    <aside class="sidebar sidebar-right">
        <div style="font-family: 'Bebas Neue'; color: var(--fsp-gold); letter-spacing: 3px; margin-bottom: 30px;">LIVE_INTEL</div>
        <div id="intel-feed"></div>
    </aside>

    <script>
        const names = ["SOPHIA", "JORDAN", "ELENA", "ZARA", "VALENTINA", "MILA", "ALEXA", "SLOANE"];

        function bootPortal() {
            const grid = document.getElementById('matrix-inject');
            let cards = "";

            // Loop to generate nodes
            for (let i = 1; i <= 24; i++) {
                const name = names[Math.floor(Math.random() * names.length)];
                const nodeID = 100 + i;
                
                // PATH FIX: We use a high-end placeholder if the asset folder isn't found
                // To use your real images, put them in: /assets/surrogates/name.jpg
                const imgPath = `assets/surrogates/${name.toLowerCase()}.jpg`;

                cards += `
                <div class="node-card">
                    <div class="node-image-container">
                        <img src="${imgPath}" onerror="this.src='https://via.placeholder.com/400x600/0a0a0a/c5a059?text=${name}_${nodeID}'" alt="${name}">
                    </div>
                    <div class="node-overlay">
                        <div class="node-status">● SYNC_ACTIVE</div>
                        <div class="node-name">${name}_${nodeID}</div>
                        <div style="font-size: 0.5rem; color: #555; letter-spacing: 2px;">RANK: ELITE_SURROGATE</div>
                    </div>
                </div>`;
            }
            grid.innerHTML = cards;
            startIntel();
        }

        function startIntel() {
            const feed = document.getElementById('intel-feed');
            setInterval(() => {
                const name = names[Math.floor(Math.random() * names.length)];
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `<b>NODE_${name}</b> uploaded new 8K master file.`;
                feed.prepend(entry);
                if(feed.children.length > 12) feed.removeChild(feed.lastChild);
            }, 3000);
        }
    </script>
</body>
</html>
