<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Ledger | FSP Obsidian Directorate</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;700;900&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --fsp-fire: #ff3300; 
            --fsp-gold: #c5a059; 
            --fsp-pitch: #080808; 
            --fsp-green: #00ff66;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* WEBMASTER UTILITY: LOADING BAR */
        #loading-bar {
            position: fixed; top: 0; left: 0; height: 2px;
            background: var(--fsp-fire); width: 0%; z-index: 1000;
            transition: width 0.4s ease;
        }

        /* HEADER & SYSTEM STATUS */
        header {
            padding: 30px 5%;
            background: rgba(0,0,0,0.9);
            border-bottom: 1px solid #111;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .sys-info { font-family: 'Source Code Pro'; font-size: 0.6rem; color: #444; letter-spacing: 2px; }
        .sys-info span { color: var(--fsp-green); }

        .logo { font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 5px; color: #fff; }

        /* LEDGER CONTENT */
        .container { max-width: 1400px; margin: 50px auto; padding: 0 5%; }
        
        .ledger-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        /* SURROGATE CARD */
        .talent-card {
            background: var(--fsp-pitch);
            border: 1px solid #151515;
            padding: 20px;
            position: relative;
            transition: 0.3s ease;
        }

        .talent-card:hover {
            border-color: var(--fsp-gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .status-indicator {
            position: absolute; top: 20px; right: 20px;
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--fsp-green);
            box-shadow: 0 0 10px var(--fsp-green);
        }

        .talent-id { font-family: 'Source Code Pro'; font-size: 0.65rem; color: var(--fsp-gold); margin-bottom: 10px; }
        .talent-name { font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 2px; }
        
        .talent-stats {
            margin-top: 20px; padding-top: 15px;
            border-top: 1px solid #111;
            display: flex; justify-content: space-between;
            font-size: 0.7rem; color: #666;
        }

        /* ACTION BUTTONS */
        .btn-sync {
            display: block; width: 100%; text-align: center;
            margin-top: 20px; padding: 12px;
            background: transparent; border: 1px solid #222;
            color: #fff; text-decoration: none; font-size: 0.7rem;
            font-weight: 900; letter-spacing: 2px; transition: 0.3s;
        }

        .btn-sync:hover { background: #fff; color: #000; border-color: #fff; }

    </style>
</head>
<body onload="initSystem()">

    <div id="loading-bar"></div>

    <header>
        <div class="logo">OBSIDIAN_LEDGER</div>
        <div class="sys-info">
            STATUS: <span>ENCRYPTED_LIVE</span> // 
            NODES: <span id="node-count">302</span> // 
            SYNC_RATE: <span>99.8%</span>
        </div>
    </header>

    <div class="container">
        <h2 style="font-family: 'Bebas Neue'; font-size: 2.5rem; letter-spacing: 10px; margin-bottom: 40px;">TALENT_NODES_DIRECTORY</h2>
        
        <div class="ledger-grid" id="ledger-grid">
            </div>
    </div>

    <script>
        // WEBMASTER TOOLS: SYSTEM INITIALIZATION
        function initSystem() {
            const bar = document.getElementById('loading-bar');
            bar.style.width = '100%';
            
            setTimeout(() => {
                bar.style.opacity = '0';
                generateNodes();
            }, 600);
        }

        // AUTO-GENERATING THE 300 SURROGATE NODES
        function generateNodes() {
            const grid = document.getElementById('ledger-grid');
            const names = ["Sophia", "Jordan", "Elena", "Zara", "Valentina", "Mila", "Alexa", "Sloane"];
            
            for (let i = 1; i <= 24; i++) { // Generating first 24 for instant load, can be scaled
                const randomName = names[Math.floor(Math.random() * names.length)];
                const nodeHtml = `
                    <div class="talent-card">
                        <div class="status-indicator"></div>
                        <div class="talent-id">NODE_ID: FSP-${1000 + i}</div>
                        <div class="talent-name">${randomName.toUpperCase()}</div>
                        <div style="font-size: 0.6rem; color: #444; margin-top: 5px;">RANK: ELITE_SURROGATE</div>
                        
                        <div class="talent-stats">
                            <div>SYNC: 100%</div>
                            <div>ROI: +12.4%</div>
                        </div>
                        
                        <a href="production-briefs.html" class="btn-sync">ACCESS_SYNC_VAULT</a>
                    </div>
                `;
                grid.innerHTML += nodeHtml;
            }
        }
    </script>
</body>
</html>
