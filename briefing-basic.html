<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Basic Identity Enrollment | FSP Obsidian Directorate</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --fsp-pitch: #000; --fsp-fire: #ff3300; --fsp-gold: #c5a059; --fsp-white: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--fsp-pitch); color: var(--fsp-white); font-family: 'Outfit', sans-serif; line-height: 1.6; }

        /* UNIVERSAL BIG DOG HEADER */
        header { 
            height: 180px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 60px; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px); 
            position: fixed; width: 100%; top: 0; z-index: 10000; border-bottom: 1px solid #111; 
        }
        .logo { height: 150px; transition: 0.4s; }
        .logo:hover { filter: drop-shadow(0 0 15px var(--fsp-fire)); }

        .main-nav { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; }
        .main-nav a { color: #555; text-decoration: none; font-weight: 900; font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; transition: 0.3s; }
        .main-nav a:hover { color: var(--fsp-fire); }
        .main-nav a.active { color: var(--fsp-white); border-bottom: 1px solid var(--fsp-fire); padding-bottom: 5px; }

        .system-status { display: flex; align-items: center; gap: 12px; border-right: 3px solid var(--fsp-fire); padding-right: 20px; }
        .pulse { width: 10px; height: 10px; background: var(--fsp-fire); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* ENROLLMENT LAYOUT */
        .form-container { 
            max-width: 1000px; margin: 240px auto 100px; padding: 60px; 
            background: #080808; border: 1px solid #1a1a1a; position: relative;
        }
        .form-container::before { 
            content: 'IDENTITY LEDGER // INTAKE PORTAL'; position: absolute; top: -15px; left: 20px; 
            background: var(--fsp-fire); color: #fff; padding: 5px 15px; font-size: 0.6rem; 
            font-weight: 900; letter-spacing: 2px; 
        }

        h1 { font-family: 'Bebas Neue'; font-size: clamp(3rem, 6vw, 5rem); letter-spacing: 12px; color: var(--fsp-gold); margin-bottom: 10px; }
        .instruction { color: #555; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 50px; text-transform: uppercase; border-bottom: 1px solid #111; padding-bottom: 20px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; }
        .input-group { margin-bottom: 30px; }
        label { display: block; font-size: 0.65rem; color: #444; letter-spacing: 2px; margin-bottom: 10px; font-weight: 900; text-transform: uppercase; }
        
        input, select, textarea { 
            width: 100%; background: #000; border: 1px solid #222; padding: 20px; 
            color: #fff; font-family: 'Outfit'; font-size: 1rem; transition: 0.4s; 
        }
        input:focus, select:focus, textarea:focus { border-color: var(--fsp-gold); outline: none; background: #050505; }

        /* COMPLIANCE & VERIFICATION BOX */
        .compliance-vault { 
            background: #000; padding: 40px; border: 1px solid #1a1a1a; 
            margin: 50px 0; border-left: 4px solid var(--fsp-fire);
        }
        .check-row { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 20px; }
        .check-row input { width: 30px; height: 30px; cursor: pointer; flex-shrink: 0; }
        .check-text { font-size: 0.75rem; color: #777; line-height: 1.6; letter-spacing: 0.5px; }
        .check-text b { color: var(--fsp-fire); }

        .btn-submit { 
            width: 100%; padding: 30px; background: #111; color: #fff; 
            border: 1px solid #222; font-weight: 900; letter-spacing: 10px; cursor: pointer; 
            text-transform: uppercase; transition: 0.5s; font-size: 1rem; 
        }
        .btn-submit:hover:not(:disabled) { background: var(--fsp-fire); color: #fff; letter-spacing: 15px; box-shadow: 0 0 30px rgba(255,51,0,0.3); }
        .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; }

        footer { text-align: center; padding-bottom: 100px; color: #222; font-size: 0.6rem; letter-spacing: 5px; }

        @media (max-width: 900px) { .form-grid { grid-template-columns: 1fr; } .main-nav { display: none; } }
    </style>
</head>
<body>

    <header>
        <a href="index.html"><img src="VEXILLIALSDP_FSP.png" class="logo" alt="FSP"></a>
        <nav class="main-nav">
            <a href="index.html">COMMAND</a>
            <a href="briefing-basic.html" class="active">ENROLL</a>
            <a href="briefing-pro.html">PRO</a>
            <a href="briefing-elite.html">ELITE</a>
            <a href="briefing-icon.html">ICON</a>
        </nav>
        <div class="system-status">
            <span class="pulse"></span>
            <span style="color:var(--fsp-fire); font-weight:900; letter-spacing:4px; font-size: 0.7rem;">AUTH MODE</span>
        </div>
    </header>

<main class="form-container">
    <h1>IDENTITY SYNC</h1>
    <p class="instruction">Basic Level Authorization // 18 USC § 2257 Record-Keeping Intake</p>

    <form onsubmit="initiateEnrollment(event)">
        <div class="form-grid">
            <div class="input-group">
                <label>LEGAL FIRST NAME (PRIVATE)</label>
                <input type="text" required placeholder="AS PER GOVT IDENTIFICATION">
            </div>
            <div class="input-group">
                <label>LEGAL LAST NAME (PRIVATE)</label>
                <input type="text" required placeholder="AS PER GOVT IDENTIFICATION">
            </div>
        </div>

        <div class="input-group">
            <label>ENCRYPTED EMAIL ADDRESS</label>
            <input type="email" required placeholder="FOR DIRECTORATE CORRESPONDENCE">
        </div>

        <div class="form-grid">
            <div class="input-group">
                <label>ADULT SCREEN NAME (PUBLIC LEDGER)</label>
                <input type="text" required placeholder="E.G. 'OBSIDIAN_01'">
            </div>
            <div class="input-group">
                <label>IDENTIFIED GENDER</label>
                <select required>
                    <option value="" disabled selected>SELECT GENDER</option>
                    <option value="female">FEMALE</option>
                    <option value="male">MALE</option>
                    <option value="non-binary">NON-BINARY / OTHER</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>CORE INTERESTS & SPECIALTIES</label>
            <textarea rows="3" placeholder="E.G. DIALOGUE-DRIVEN SCRIPTING, SOLO PERFORMANCE, PHOTOGRAPHY, REMOTE NODE CONTENT"></textarea>
        </div>

        <div class="compliance-vault">
            <div class="check-row">
                <input type="checkbox" required id="age-verify">
                <label for="age-verify" class="check-text">
                    <b>MANDATORY:</b> I certify that I am at least 18 years of age and hold valid government identification. I understand that the Obsidian Directorate maintains records in full compliance with <b>18 U.S.C. § 2257</b>.
                </label>
            </div>
            <div class="check-row">
                <input type="checkbox" required id="law-verify">
                <label for="law-verify" class="check-text">
                    I agree to operate within all local adult entertainment laws and understand that my identity is being credentialed for professional production purposes.
                </label>
            </div>
        </div>

        <button type="submit" class="btn-submit">INITIALIZE BASIC IDENTITY</button>
    </form>
</main>

<footer>
    &copy; 2026 FILTHY SEDUCTION PRODUCTIONS | THE OBSIDIAN DIRECTORATE | SYSTEM ENCRYPTION ACTIVE
</footer>

<script>
    function initiateEnrollment(e) {
        e.preventDefault();
        sessionStorage.setItem('selectedTier', 'basic');
        alert("IDENTITY VERIFIED. INITIATING METADATA SYNC...");
        window.location.href = "join.html";
    }
</script>

</body>
</html>
