<script>
    window.onload = function() {
        const profile = JSON.parse(localStorage.getItem('fsp_active_profile'));
        const tier = (sessionStorage.getItem('selectedTier') || 'BASIC').toUpperCase();

        if(!profile) {
            window.location.href = "index.html"; 
            return;
        }

        document.getElementById('final-name').innerText = profile.name;
        document.getElementById('final-id').innerText = profile.id;
        document.getElementById('final-ssn').innerText = profile.ssn;

        let price = "$0.00";
        let term = "BASIC ENTRY (N/A)";
        
        // --- EDIT THESE LINKS BELOW ---
        let link = "index.html"; // Default fallback if tier is missing

        if(tier === 'PRO') {
            price = "$87.00";
            term = "3 MONTHS (ADVANCE)";
            link = "https://buy.stripe.com/your_actual_pro_link"; // PASTE YOUR STRIPE LINK HERE
        } else if(tier === 'ELITE') {
            price = "$594.00";
            term = "6 MONTHS (ADVANCE)";
            link = "https://buy.stripe.com/your_actual_elite_link"; // PASTE YOUR STRIPE LINK HERE
        } else if(tier === 'ICON') {
            price = "$2,988.00";
            term = "12 MONTHS (ADVANCE)";
            link = "https://buy.stripe.com/your_actual_icon_link"; // PASTE YOUR STRIPE LINK HERE
        }

        document.getElementById('final-price').innerText = price;
        document.getElementById('final-term').innerText = term;
        document.getElementById('payment-trigger').href = link;
    }
</script>
